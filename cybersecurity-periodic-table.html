<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A0E1A;
    --navy2: #0f1528;
    --cyan: #00D4FF;
    --cyan2: #00a8cc;
    --purple: #7B2FBE;
    --purple2: #9d4fe8;
    --gold: #FFD700;
    --red: #FF4757;
    --green: #2ED573;
    --orange: #FF6B35;
    --pink: #FF6B9D;
    --teal: #1DE9B6;

    /* Categories */
    --cat-threats:    #7B2FBE;
    --cat-attacks:    #FF4757;
    --cat-defense:    #2ED573;
    --cat-crypto:     #00D4FF;
    --cat-network:    #FF6B35;
    --cat-auth:       #FFD700;
    --cat-malware:    #FF6B9D;
    --cat-tools:      #1DE9B6;
    --cat-governance: #9d4fe8;
    --cat-cloud:      #4FC3F7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: #e0e8ff;
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(123,47,190,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(0,212,255,0.08) 0%, transparent 50%),
      linear-gradient(rgba(0,212,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.015) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  }

  header {
    text-align: center;
    padding: 36px 20px 20px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .logo-bl {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .logo-bl .b { color: var(--cyan); }
  .logo-bl .l { color: var(--purple2); }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 3.5vw, 38px);
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
    line-height: 1.2;
  }
  h1 span { color: var(--cyan); }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(0,212,255,0.6);
    letter-spacing: 3px;
    margin-top: 8px;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 18px 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.7);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* Table */
  .pt-wrapper {
    padding: 10px 20px 40px;
    overflow-x: auto;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(64px, 72px));
    gap: 4px;
    width: fit-content;
    margin: 0 auto;
  }

  /* Element card */
  .el {
    position: relative;
    aspect-ratio: 1;
    border: 1px solid;
    border-radius: 4px;
    padding: 5px 4px 4px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, z-index 0s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    background: rgba(10, 14, 26, 0.85);
    z-index: 1;
  }

  .el::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    transition: opacity 0.2s;
    background: currentColor;
  }

  .el:hover {
    transform: scale(1.18) translateY(-4px);
    z-index: 100;
    box-shadow: 0 0 20px -2px currentColor, 0 8px 30px rgba(0,0,0,0.6);
  }

  .el:hover::before { opacity: 0.18; }

  .el-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    opacity: 0.65;
    line-height: 1;
  }

  .el-sym {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(14px, 1.8vw, 22px);
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 10px currentColor;
  }

  .el-name {
    font-size: 7.5px;
    text-align: center;
    line-height: 1.2;
    opacity: 0.8;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .el-cat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 6px;
    text-align: right;
    opacity: 0.55;
    letter-spacing: 0.5px;
    line-height: 1;
  }

  /* Empty spacer */
  .spacer { aspect-ratio: 1; }

  /* Tooltip / modal overlay */
  .tooltip {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(420px, 90vw);
    background: rgba(10,14,26,0.97);
    border: 1px solid;
    border-radius: 10px;
    padding: 28px;
    z-index: 9999;
    display: none;
    box-shadow: 0 0 60px -10px currentColor;
    backdrop-filter: blur(20px);
  }

  .tooltip.active { display: block; animation: popIn 0.2s ease; }

  @keyframes popIn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.92); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  .tooltip-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9998;
    display: none;
    backdrop-filter: blur(2px);
  }
  .tooltip-overlay.active { display: block; }

  .tt-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
  }

  .tt-sym-big {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 52px;
    line-height: 1;
    text-shadow: 0 0 20px currentColor;
    min-width: 70px;
    text-align: center;
  }

  .tt-meta { flex: 1; }
  .tt-num-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .tt-name {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .tt-cat-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    opacity: 0.85;
  }

  .tt-desc {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(220,230,255,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 14px;
  }

  .tt-close {
    position: absolute;
    top: 12px; right: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    background: none; border: none; color: inherit;
  }
  .tt-close:hover { opacity: 1; }

  /* Section label rows */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 20px 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,212,255,0.4);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(0,212,255,0.1);
  }

  /* Period label */
  .period-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    aspect-ratio: 1;
  }

  @media (max-width: 900px) {
    .pt-grid {
      grid-template-columns: repeat(18, minmax(48px, 58px));
    }
    .el-sym { font-size: 14px; }
    .el-name { font-size: 6.5px; }
  }
</style>
</head>

<header>
  <div class="logo-bl"><span class="b">B</span><span class="l">L</span> · BALTAZAR LABORTE</div>

</div>

// Build layout: standard periodic table rows + lanthanide/actinide separation rows
// Row structure: 7 main rows (18 cols each) + 2 separator rows + 2 extra rows (15 wide starting col 3)

function buildGrid() {
  const grid = document.getElementById('ptGrid');
  const rows = [];

  // Split elements into the rows
  let idx = 0;
  for (let r = 0; r < 7; r++) {
    const row = [];
    for (let c = 0; c < 18; c++) {
      row.push(ELEMENTS[idx++]);
    }
    rows.push(row);
  }
  // Lanthanide / Actinide rows (16 each: 2 spacers + 15 elements + 1 null)
  for (let r = 0; r < 2; r++) {
    const row = [null, null]; // 2 empty spacers
    for (let c = 0; c < 15; c++) {
      row.push(ELEMENTS[idx++]);
    }
    row.push(null);
    rows.push(row);
  }

  rows.forEach((row, ri) => {
    // Insert separator rows label before lanthanides
    if (ri === 7) {
      const sep = document.createElement('div');
      sep.style.gridColumn = '1 / -1';
      sep.style.height = '14px';
      sep.style.display = 'flex';
      sep.style.alignItems = 'center';
      sep.style.paddingLeft = '8px';
      sep.style.fontFamily = "'Share Tech Mono', monospace";
      sep.style.fontSize = '9px';
      sep.style.letterSpacing = '2px';
      sep.style.color = 'rgba(0,212,255,0.3)';
      sep.textContent = '── LANTHANIDES & ACTINIDES ──────────────────────────';
      grid.appendChild(sep);
    }

    row.forEach((el, ci) => {
      if (!el) {
        const sp = document.createElement('div');
        sp.className = 'spacer';
        grid.appendChild(sp);
        return;
      }
      const cat = CATEGORIES[el.cat];
      const div = document.createElement('div');
      div.className = 'el';
      div.style.color = cat.color;
      div.style.borderColor = cat.color + '55';
      div.innerHTML = `
        <div class="el-num">${el.num}</div>
        <div class="el-sym">${el.sym}</div>
        <div class="el-name">${el.name}</div>
        <div class="el-cat">${el.cat.toUpperCase().slice(0,4)}</div>
      `;
      div.addEventListener('click', () => showTooltip(el, cat));
      grid.appendChild(div);
    });
  });
}

function showTooltip(el, cat) {
  const tt = document.getElementById('tooltip');
  const ov = document.getElementById('overlay');
  document.getElementById('ttSym').textContent = el.sym;
  document.getElementById('ttSym').style.color = cat.color;
  document.getElementById('ttNum').textContent = `ELEMENT #${el.num}`;
  document.getElementById('ttName').textContent = el.name;
  const badge = document.getElementById('ttCat');
  badge.textContent = cat.label;
  badge.style.color = cat.color;
  badge.style.borderColor = cat.color + '88';
  document.getElementById('ttDesc').textContent = el.desc;
  tt.style.color = cat.color;
  tt.style.borderColor = cat.color + '88';
  tt.classList.add('active');
  ov.classList.add('active');
}

function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${cat.color}"></div>${cat.label}`;
    legend.appendChild(item);
  });
}

document.getElementById('ttClose').addEventListener('click', () => {
  document.getElementById('tooltip').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('tooltip').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
});

buildLegend();
buildGrid();
</script>
